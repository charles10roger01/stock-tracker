<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>強勢股追蹤儀表板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-update { font-size: 12px; color: #888; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* 多方/空方主切換 */
  .mode-switch { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-btn { padding: 10px 28px; border-radius: 8px; border: 1.5px solid #e5e5e5; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .mode-btn.bull { border-color: #dc2626; color: #dc2626; }
  .mode-btn.bull.active { background: #dc2626; color: #fff; }
  .mode-btn.bear { border-color: #16a34a; color: #16a34a; }
  .mode-btn.bear.active { background: #16a34a; color: #fff; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
  .metric-val { font-size: 24px; font-weight: 600; }
  .metric-val.warn { color: #d97706; }
  .metric-val.success { color: #16a34a; }
  .metric-val.info { color: #2563eb; }
  .metric-val.danger { color: #dc2626; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .view-toggle { display: flex; gap: 6px; }
  .view-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #e5e5e5; background: #fff; color: #666; font-size: 12px; cursor: pointer; }
  .view-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn { padding: 7px 16px; border-radius: 6px; border: 1px solid #e5e5e5; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 3px 10px; font-size: 11px; }
  .btn-danger { border-color: #fca5a5; color: #dc2626; }

  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; overflow: hidden; margin-bottom: 16px; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 1px solid #f0f0f0; color: #888; font-weight: 500; white-space: nowrap; background: #fafafa; }
  td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
  .b-fly { background: #dcfce7; color: #15803d; }
  .b-near { background: #fef3c7; color: #b45309; }
  .b-wait { background: #dbeafe; color: #1d4ed8; }
  .b-drop { background: #fee2e2; color: #b91c1c; }
  .b-unknown { background: #f3f4f6; color: #6b7280; }
  .b-short-ready { background: #dcfce7; color: #15803d; }
  .b-short-wait { background: #dbeafe; color: #1d4ed8; }
  .peak-val { color: #dc2626; font-weight: 600; }
  .stock-link { color: #2563eb; text-decoration: none; font-weight: 500; }
  .stock-link:hover { text-decoration: underline; }

  .group-header { padding: 10px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
  .group-title { font-size: 13px; font-weight: 600; }
  .group-count { font-size: 11px; color: #888; font-weight: 400; margin-left: 6px; }
  .alert-tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #fef3c7; color: #b45309; font-weight: 500; }
  .fly-tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #dcfce7; color: #15803d; font-weight: 500; }
  .short-tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #dcfce7; color: #15803d; font-weight: 500; }
  .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 13px; }

  .notice { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #92400e; margin-bottom: 16px; line-height: 1.6; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: 95vw; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; }
  .modal textarea { height: 120px; resize: none; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e5e5; margin-bottom: 16px; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
  .preview-tooltip { position: fixed; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 12px; width: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; display: none; pointer-events: none; }
  .preview-header { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
  @media (max-width: 600px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } .container { padding: 12px; } }
</style>
</head>
<body>

<div class="header">
  <h1>強勢股追蹤儀表板</h1>
  <div class="header-right">
    <span class="last-update" id="last-update">載入中...</span>
    <button class="btn btn-primary" onclick="openAddModal()">+ 新增股票</button>
  </div>
</div>

<div class="container">
  <div class="notice" id="data-notice" style="display:none;">
    ⚠️ 找不到 stocks.json，目前顯示範例資料。請依照說明文件設定 GitHub Repository。
  </div>

  <!-- 多方/空方主切換 -->
  <div class="mode-switch">
    <button class="mode-btn bull active" onclick="setMode('bull')">📈 多方追蹤</button>
    <button class="mode-btn bear" onclick="setMode('bear')">📉 空方追蹤</button>
  </div>

  <!-- 多方面板 -->
  <div id="bull-panel">
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">多方追蹤中</div><div class="metric-val" id="bull-cnt-total">0</div></div>
      <div class="metric"><div class="metric-label">準備進場</div><div class="metric-val warn" id="bull-cnt-near">0</div></div>
      <div class="metric"><div class="metric-label">仍在飆升</div><div class="metric-val success" id="bull-cnt-fly">0</div></div>
      <div class="metric"><div class="metric-label">等待反彈</div><div class="metric-val info" id="bull-cnt-wait">0</div></div>
    </div>
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('bull','all')">全部</button>
        <button class="view-btn" onclick="setView('bull','group')">依族群</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-sm" onclick="exportStocks()">匯出清單</button>
        <button class="btn btn-sm" onclick="document.getElementById('import-input').click()">匯入清單</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importStocks(this)">
      </div>
    </div>
    <div id="bull-all-view"><div class="card"><div class="tbl-wrap"><table><thead id="bull-all-head"></thead><tbody id="bull-all-body"></tbody></table></div><div class="empty" id="bull-empty" style="display:none;">尚無多方追蹤股票</div></div></div>
    <div id="bull-group-view" style="display:none;"></div>
  </div>

  <!-- 空方面板 -->
  <div id="bear-panel" style="display:none;">
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">空方追蹤中</div><div class="metric-val" id="bear-cnt-total">0</div></div>
      <div class="metric"><div class="metric-label">接近月線</div><div class="metric-val success" id="bear-cnt-ready">0</div></div>
      <div class="metric"><div class="metric-label">等待反彈</div><div class="metric-val info" id="bear-cnt-wait">0</div></div>
      <div class="metric"><div class="metric-label">月線斜率</div><div class="metric-val danger">↓</div></div>
    </div>
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('bear','all')">全部</button>
        <button class="view-btn" onclick="setView('bear','group')">依族群</button>
      </div>
    </div>
    <div id="bear-all-view"><div class="card"><div class="tbl-wrap"><table><thead id="bear-all-head"></thead><tbody id="bear-all-body"></tbody></table></div><div class="empty" id="bear-empty" style="display:none;">尚無空方追蹤股票（月線斜率轉負時自動移入）</div></div></div>
    <div id="bear-group-view" style="display:none;"></div>
  </div>
</div>

<div id="preview-tooltip" class="preview-tooltip">
  <div class="preview-header" id="preview-header"></div>
  <div id="preview-iframe-container"></div>
</div>

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h2>新增股票</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchAddTab('manual')">手動輸入</div>
      <div class="tab" onclick="switchAddTab('batch')">批次輸入</div>
    </div>
    <div id="tab-manual">
      <label>股票代號</label>
      <input type="text" id="add-code" placeholder="例如：2417">
      <label>股票名稱</label>
      <input type="text" id="add-name" placeholder="例如：圓剛">
      <label>產業族群</label>
      <input type="text" id="add-sector" placeholder="例如：電子中游-PC介面卡">
    </div>
    <div id="tab-batch" style="display:none;">
      <label>每行一個股票（格式：代號 名稱 族群）</label>
      <textarea id="batch-input" placeholder="2417 圓剛 電子中游-PC介面卡&#10;3016 嘉晶 電子上游-晶圓材料"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAddModal()">取消</button>
      <button class="btn btn-primary" onclick="addStocks()">加入</button>
    </div>
  </div>
</div>

<script>
const REPO = 'charles10roger01/stock-tracker';
const DATA_URL = `https://raw.githubusercontent.com/${REPO}/main/stocks.json`;
const LS_KEY = 'stock-tracker-v4';

let stocks = [];
let currentMode = 'bull'; // bull or bear
let bullView = 'all';
let bearView = 'all';
let addTab = 'manual';

// ===== 月線斜率計算 =====
function calcMA(prices, period) {
  const vals = Object.entries(prices).sort((a,b) => {
    const [am,ad]=a[0].split('/').map(Number),[bm,bd]=b[0].split('/').map(Number);
    return am!==bm?am-bm:ad-bd;
  }).map(e=>Number(e[1])).filter(Boolean);
  if (vals.length < period) return null;
  const slice = vals.slice(-period);
  return slice.reduce((a,b)=>a+b,0)/slice.length;
}

function calcMASlope(prices) {
  // 比較今天的20MA和5天前的20MA
  const vals = Object.entries(prices).sort((a,b) => {
    const [am,ad]=a[0].split('/').map(Number),[bm,bd]=b[0].split('/').map(Number);
    return am!==bm?am-bm:ad-bd;
  }).map(e=>Number(e[1])).filter(Boolean);
  if (vals.length < 25) return null; // 資料不足
  const maToday = vals.slice(-20).reduce((a,b)=>a+b,0)/20;
  const ma5ago = vals.slice(-25,-5).reduce((a,b)=>a+b,0)/20;
  return (maToday - ma5ago) / ma5ago;
}

function isBearish(stock) {
  const slope = calcMASlope(stock.prices || {});
  return slope !== null && slope < 0;
}

// ===== 資料載入 =====
async function init() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (r.ok) {
      const data = await r.json();
      stocks = data.stocks || [];
      document.getElementById('last-update').textContent = '最後更新：' + (data.lastUpdate || '未知');
    } else { loadLocal(); }
  } catch(e) { loadLocal(); }
  autoMoveToBear();
  render();
}

function loadLocal() {
  try { const s = localStorage.getItem(LS_KEY); if (s) stocks = JSON.parse(s); }
  catch(e) { stocks = []; }
  document.getElementById('data-notice').style.display = 'block';
  document.getElementById('last-update').textContent = '本機資料';
}

function saveLocal() { localStorage.setItem(LS_KEY, JSON.stringify(stocks)); }
function today() { const d = new Date(); return `${d.getMonth()+1}/${d.getDate()}`; }

// ===== 自動移入空方 =====
function autoMoveToBear() {
  let moved = 0;
  stocks.forEach(s => {
    if (!s.side || s.side === 'bull') {
      if (isBearish(s)) {
        s.side = 'bear';
        s.movedToBearDate = today();
        moved++;
      }
    }
  });
  if (moved > 0) {
    saveLocal();
    console.log(`自動移入空方：${moved} 檔`);
  }
}

// ===== 狀態計算 =====
function getPeak(s) { const v=Object.values(s.prices||{}).map(Number).filter(Boolean); return v.length?Math.max(...v):null; }
function getLatest(s) { const e=Object.entries(s.prices||{}); return e.length?Number(e[e.length-1][1]):null; }
function getPct(s) { const p=getPeak(s),l=getLatest(s); return (p&&l)?((l-p)/p*100).toFixed(1):null; }

function getBullStatus(s) {
  const vals=Object.values(s.prices||{}).map(Number).filter(Boolean);
  if (!vals.length) return 'unknown';
  const peak=Math.max(...vals),latest=vals[vals.length-1];
  const pct=(latest-peak)/peak*100;
  if (latest>=peak) return 'fly';
  if (pct>=-3) return 'near';
  if (pct>=-15) return 'wait';
  return 'drop';
}

function getBearStatus(s) {
  const ma = calcMA(s.prices||{}, 20);
  const latest = getLatest(s);
  if (!ma || !latest) return 'unknown';
  const pct = (latest - ma) / ma * 100;
  if (pct <= 3) return 'short-ready'; // 接近月線，準備做空
  return 'short-wait'; // 等待反彈到月線
}

function bullBadge(st) {
  const map={fly:['仍在飆升','b-fly'],near:['準備進場','b-near'],wait:['等待反彈','b-wait'],drop:['大幅回落','b-drop'],unknown:['-','b-unknown']};
  const [l,c]=map[st]||map.unknown; return `<span class="badge ${c}">${l}</span>`;
}

function bearBadge(st) {
  const map={'short-ready':['接近月線','b-short-ready'],'short-wait':['等待反彈','b-short-wait'],unknown:['-','b-unknown']};
  const [l,c]=map[st]||map.unknown; return `<span class="badge ${c}">${l}</span>`;
}

function getAllDates() {
  return [...new Set(stocks.flatMap(s=>Object.keys(s.prices||{})))].sort((a,b)=>{
    const [am,ad]=a.split('/').map(Number),[bm,bd]=b.split('/').map(Number);
    return am!==bm?am-bm:ad-bd;
  });
}

// ===== 渲染 =====
function render() {
  const allDates = getAllDates();
  const bullStocks = stocks.filter(s => !s.side || s.side === 'bull');
  const bearStocks = stocks.filter(s => s.side === 'bear');

  // 多方統計
  let bFly=0,bNear=0,bWait=0;
  bullStocks.forEach(s=>{const st=getBullStatus(s);if(st==='fly')bFly++;if(st==='near')bNear++;if(st==='wait')bWait++;});
  document.getElementById('bull-cnt-total').textContent=bullStocks.length;
  document.getElementById('bull-cnt-fly').textContent=bFly;
  document.getElementById('bull-cnt-near').textContent=bNear;
  document.getElementById('bull-cnt-wait').textContent=bWait;

  // 空方統計
  let sReady=0,sWait=0;
  bearStocks.forEach(s=>{const st=getBearStatus(s);if(st==='short-ready')sReady++;if(st==='short-wait')sWait++;});
  document.getElementById('bear-cnt-total').textContent=bearStocks.length;
  document.getElementById('bear-cnt-ready').textContent=sReady;
  document.getElementById('bear-cnt-wait').textContent=sWait;

  renderBullTable(bullStocks, allDates);
  renderBearTable(bearStocks, allDates);
  if (bullView==='group') renderGroups('bull', bullStocks, allDates);
  if (bearView==='group') renderGroups('bear', bearStocks, allDates);
}

function stockRow(s, idx, allDates, mode) {
  const peak=getPeak(s),pct=getPct(s);
  const st = mode==='bull'?getBullStatus(s):getBearStatus(s);
  const badge = mode==='bull'?bullBadge(st):bearBadge(st);
  const ma = s.ma ? s.ma.toFixed(2) : '-';
  const slope = calcMASlope(s.prices||{});
  const slopeStr = slope!==null?(slope>=0?'↑ '+Math.abs(slope*100).toFixed(2)+'%':'↓ '+Math.abs(slope*100).toFixed(2)+'%'):'-';
  const slopeColor = slope!==null?(slope>=0?'color:#dc2626':'color:#16a34a'):'';
  const priceCells=allDates.map(d=>{const v=s.prices?.[d];return`<td class="${v&&Number(v)===peak?'peak-val':''}">${v||'-'}</td>`;}).join('');
  return `<tr>
    <td><a class="stock-link" href="#" onclick="copyCode('${s.code}');return false;">${s.code}</a></td>
    <td><a class="stock-link" href="https://www.wantgoo.com/stock/${s.code}/technical-chart" target="_blank" onmouseenter="showPreview(event,'${s.code}','${s.name||s.code}')" onmouseleave="hidePreview()" style="color:#1a1a1a;font-weight:500;">${s.name||'-'}</a></td>
    <td style="color:#888;font-size:11px;">${s.sector||'-'}</td>
    <td>${peak?peak.toFixed(2):'-'}</td>
    <td>${pct!==null?pct+'%':'-'}</td>
    <td>${ma}</td>
    <td style="${slopeColor};font-size:11px;">${slopeStr}</td>
    <td>${badge}</td>
    ${priceCells}
    <td>
      ${mode==='bull'?`<button class="btn btn-sm" style="margin-right:4px;color:#16a34a;border-color:#86efac;" onclick="moveToBear(${idx})">→空</button>`:`<button class="btn btn-sm" style="margin-right:4px;color:#dc2626;border-color:#fca5a5;" onclick="moveToBull(${idx})">→多</button>`}
      <button class="btn btn-sm btn-danger" onclick="removeStock(${idx})">移除</button>
    </td>
  </tr>`;
}

function renderBullTable(bullStocks, allDates) {
  const empty = document.getElementById('bull-empty');
  if (!bullStocks.length) { empty.style.display='block'; document.getElementById('bull-all-head').innerHTML=''; document.getElementById('bull-all-body').innerHTML=''; return; }
  empty.style.display='none';
  document.getElementById('bull-all-head').innerHTML=`<tr><th>代號</th><th>名稱</th><th>族群</th><th>前高</th><th>距前高</th><th>月線</th><th>月線斜率</th><th>狀態</th>${allDates.map(d=>`<th>${d}</th>`).join('')}<th></th></tr>`;
  document.getElementById('bull-all-body').innerHTML=bullStocks.map((s,i)=>stockRow(s,stocks.indexOf(s),allDates,'bull')).join('');
}

function renderBearTable(bearStocks, allDates) {
  const empty = document.getElementById('bear-empty');
  if (!bearStocks.length) { empty.style.display='block'; document.getElementById('bear-all-head').innerHTML=''; document.getElementById('bear-all-body').innerHTML=''; return; }
  empty.style.display='none';
  document.getElementById('bear-all-head').innerHTML=`<tr><th>代號</th><th>名稱</th><th>族群</th><th>前高</th><th>距前高</th><th>月線</th><th>月線斜率</th><th>狀態</th>${allDates.map(d=>`<th>${d}</th>`).join('')}<th></th></tr>`;
  document.getElementById('bear-all-body').innerHTML=bearStocks.map((s,i)=>stockRow(s,stocks.indexOf(s),allDates,'bear')).join('');
}

function renderGroups(mode, list, allDates) {
  const groups={};
  list.forEach(s=>{const g=s.sector||'未分類';if(!groups[g])groups[g]=[];groups[g].push(s);});
  let html='';
  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([gName,items])=>{
    const hasReady = mode==='bull'?items.some(s=>getBullStatus(s)==='near'):items.some(s=>getBearStatus(s)==='short-ready');
    const hasFly = mode==='bull'&&items.some(s=>getBullStatus(s)==='fly');
    html+=`<div class="card" style="margin-bottom:16px;">
      <div class="group-header">
        <div><span class="group-title">${gName}</span><span class="group-count">${items.length} 檔</span></div>
        ${hasReady?(mode==='bull'?'<span class="alert-tag">有股票準備進場</span>':'<span class="short-tag">有股票接近月線</span>'):hasFly?'<span class="fly-tag">族群強勢中</span>':''}
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>代號</th><th>名稱</th><th>前高</th><th>距前高</th><th>月線</th><th>月線斜率</th><th>狀態</th>${allDates.map(d=>`<th>${d}</th>`).join('')}<th></th></tr></thead>
        <tbody>${items.map(s=>stockRow(s,stocks.indexOf(s),allDates,mode)).join('')}</tbody>
      </table></div>
    </div>`;
  });
  document.getElementById(`${mode}-group-view`).innerHTML=html||'<div class="empty">尚無股票</div>';
}

function setMode(mode) {
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.mode-btn.${mode==='bull'?'bull':'bear'}`).classList.add('active');
  document.getElementById('bull-panel').style.display=mode==='bull'?'block':'none';
  document.getElementById('bear-panel').style.display=mode==='bear'?'block':'none';
}

function setView(mode, v) {
  if (mode==='bull') bullView=v; else bearView=v;
  const allId=`${mode}-all-view`, groupId=`${mode}-group-view`;
  document.getElementById(allId).style.display=v==='all'?'block':'none';
  document.getElementById(groupId).style.display=v==='group'?'block':'none';
  document.querySelectorAll(`#${mode}-panel .view-btn`).forEach((b,i)=>b.classList.toggle('active',['all','group'][i]===v));
  if (v==='group') {
    const allDates=getAllDates();
    const list=stocks.filter(s=>mode==='bull'?(!s.side||s.side==='bull'):s.side==='bear');
    renderGroups(mode,list,allDates);
  }
}

function moveToBear(idx) { stocks[idx].side='bear'; stocks[idx].movedToBearDate=today(); saveLocal(); render(); }
function moveToBull(idx) { stocks[idx].side='bull'; delete stocks[idx].movedToBearDate; saveLocal(); render(); }
function removeStock(idx) { stocks.splice(idx,1); saveLocal(); render(); }

function copyCode(code) {
  navigator.clipboard.writeText(code).then(()=>{
    const t=document.createElement('div');
    t.textContent=`已複製 ${code}`;
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:999;';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1500);
  });
}

function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function switchAddTab(t) {
  addTab=t;
  document.querySelectorAll('#add-modal .tab').forEach((b,i)=>b.classList.toggle('active',['manual','batch'][i]===t));
  document.getElementById('tab-manual').style.display=t==='manual'?'block':'none';
  document.getElementById('tab-batch').style.display=t==='batch'?'block':'none';
}

function addStocks() {
  if (addTab==='manual') {
    const code=document.getElementById('add-code').value.trim();
    const name=document.getElementById('add-name').value.trim();
    const sector=document.getElementById('add-sector').value.trim();
    if (!code) return;
    if (!stocks.find(s=>s.code===code)) stocks.push({code,name,sector,side:'bull',prices:{},addedDate:today()});
    document.getElementById('add-code').value='';
    document.getElementById('add-name').value='';
    document.getElementById('add-sector').value='';
  } else {
    const lines=document.getElementById('batch-input').value.trim().split('\n');
    lines.forEach(l=>{
      const parts=l.trim().split(/\s+/);
      const code=parts[0],name=parts[1]||'',sector=parts.slice(2).join(' ')||'';
      if (code&&!stocks.find(s=>s.code===code)) stocks.push({code,name,sector,side:'bull',prices:{},addedDate:today()});
    });
    document.getElementById('batch-input').value='';
  }
  saveLocal(); render(); closeAddModal();
}

function exportStocks() {
  const data=JSON.stringify({stocks,lastUpdate:today()},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='stocks.json'; a.click();
}

function importStocks(input) {
  const file=input.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try { const data=JSON.parse(e.target.result); stocks=data.stocks||data||[]; saveLocal(); render(); }
    catch(err){ alert('檔案格式錯誤'); }
  };
  reader.readAsText(file);
}

// ===== 懸浮預覽 =====
let previewTimer=null;
function showPreview(e,code,name) {
  clearTimeout(previewTimer);
  previewTimer=setTimeout(()=>{
    const tooltip=document.getElementById('preview-tooltip');
    const header=document.getElementById('preview-header');
    tooltip.style.display='block';
    header.textContent=`${code} ${name} — 布林通道`;
    const container=document.getElementById('preview-iframe-container');
    const imgUrl=`https://raw.githubusercontent.com/${REPO}/main/charts/${code}.png?t=${Date.now()}`;
    container.innerHTML=`<img src="${imgUrl}" style="width:100%;border-radius:6px;" onerror="this.parentElement.innerHTML='<div style=padding:2rem;text-align:center;color:#aaa;font-size:13px;>圖表尚未生成，請先執行一鍵更新</div>'">`;
  },300);
}
function hidePreview() {
  clearTimeout(previewTimer);
  document.getElementById('preview-tooltip').style.display='none';
  document.getElementById('preview-iframe-container').innerHTML='';
}

init();
</script>
</body>
</html>
